<!DOCTYPE html>
<html>
<body>

<h2>FREE AI Video Generator 🎬</h2>

<input id="prompt" placeholder="Enter story..." style="width:300px">
<br><br>

<button onclick="gen()">Generate</button>

<p id="status" style="color:#f00;"></p>

<video id="vid" controls width="400"></video>

<script>
async function gen() {
    const prompt = document.getElementById("prompt").value.trim();
    const status = document.getElementById("status");

    if (!prompt) {
        status.innerText = "Please enter a prompt.";
        return;
    }

    status.innerText = "Generating video... please wait.";

    try {
        const res = await fetch("/generate", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ prompt })
        });

        const data = await res.json();

        if (res.ok && data.video_url) {
            document.getElementById("vid").src = data.video_url;
            status.style.color = "#0f0";
            status.innerText = "Video generated successfully!";
        } else {
            status.style.color = "#f00";
            status.innerText = "Error: " + (data.message || data.error || "Failed to generate video.");
        }
    } catch (err) {
        console.error(err);
        status.style.color = "#f00";
        status.innerText = "Server Error ❌ " + err.message;
    }
}
</script>

</body>
</html>
